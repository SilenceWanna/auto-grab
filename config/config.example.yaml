# ============================================================
# 12306 自动抢票脚本 —— 配置模板
# 使用方法：复制本文件为 config.yaml，然后按需修改。
#   cp config/config.example.yaml config/config.yaml
# 注意：config.yaml 含账号密码，已被 .gitignore 忽略，请勿提交。
# ============================================================

# ---------- 账号 ----------
account:
  username: "你的12306账号"      # 手机号 / 邮箱 / 用户名
  password: "你的密码"
  # 是否手动过验证码（推荐 true：首次人工滑块，之后复用会话）
  manual_captcha: true

# ---------- 行程 ----------
trip:
  from_station: "北京"           # 出发地（中文站名）
  to_station: "上海"             # 目的地（中文站名）
  # 乘车日期，可填多个（按顺序尝试），格式 YYYY-MM-DD
  dates:
    - "2026-02-01"
  # 目标车次，留空表示所有车次；填写则只抢这些车次
  train_codes:
    - "G1"
    - "G3"
  # 席别偏好，按优先级从高到低。可选值见下方说明
  seat_types:
    - "二等座"
    - "一等座"
  # 是否接受候补（暂未实现，预留）
  allow_candidate: false

# ---------- 乘客 ----------
# 姓名需与 12306 乘车人（原“常用联系人”）完全一致
passengers:
  - "张三"
  # - "李四"

# ---------- 轮询 ----------
polling:
  interval_seconds: 3            # 基础查询间隔（秒）
  jitter_seconds: 2             # 随机抖动上限（秒），实际间隔 = interval + rand(0, jitter)
  max_attempts: 0               # 最大尝试次数，0 表示不限制

# ---------- 通知 ----------
notify:
  sound: true                   # 成功后播放提示音
  desktop: true                 # 桌面通知
  # 可选：Server酱推送到微信，填入 SendKey 即启用，留空则关闭
  serverchan_sendkey: ""
  # 可选：钉钉群机器人 Webhook，留空则关闭
  dingtalk_webhook: ""

# ---------- 浏览器 ----------
browser:
  headless: false               # 是否无头模式（抢票建议 false 以便人工介入验证码）
  # 指定浏览器可执行文件路径，留空自动探测
  binary_path: ""

# ---------- 下单 ----------
order:
  # 干跑开关：true 时走完下单流程但不点击最终提交（不真实占座），用于安全测试。
  # 确认流程无误、真正要抢票时，改为 false 才会真实提交订单。
  dry_run: true

# ---------- 放票整点调度（可选）----------
# 留空 rush_at 时脚本行为与阶段5相同（一直按 polling.interval_seconds 慢刷）。
# 填写后：整点前 prep_seconds 内静等到整点、整点后 rush_duration_seconds 内高频冲刺，
# 其他时段仍按 polling.interval_seconds 慢刷（防止错过意外余票）。
schedule:
  # 每日放票时间点（HH:MM），常见批次：08:00 / 13:00 / 18:30 等，按你要抢的车站实际放票时间填。
  rush_at: []                     # 例如 ["13:00"]
  prep_seconds: 60                # 整点前多少秒开始预热（静等到整点）
  rush_duration_seconds: 180      # 整点后高频冲刺持续多少秒（默认 3 分钟）
  rush_interval_seconds: 0.3      # 冲刺时的查询间隔（越小越快，但被限流风险越高）
  rush_jitter_seconds: 0.4        # 冲刺间隔的随机抖动上限

# ---------- 席别可选值 ----------
# 商务座 / 特等座 / 一等座 / 二等座 / 高级软卧 / 软卧 / 动卧 / 硬卧 / 软座 / 硬座 / 无座
